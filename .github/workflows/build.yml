name: Build and Publish Electron App

on:
  push:
    tags:
      - 'V*'
  pull_request:

jobs:
  ci:
    if: ${{ !startsWith(github.ref, 'refs/tags/V') }}
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/V') }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Build and Publish Electron App
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
