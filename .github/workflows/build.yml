name: Build and Publish Electron App

on:
  push:
    tags:
      - 'V*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Build and Publish Electron App
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive win-unpacked
        shell: powershell
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $sourcePath = Join-Path $PWD 'dist\win-unpacked'
          $archivePath = Join-Path $PWD "dist\wuwchat-V$version.zip"

          if (-not (Test-Path $sourcePath)) {
            throw "win-unpacked directory not found: $sourcePath"
          }

          if (Test-Path $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }

          Compress-Archive -Path "$sourcePath\*" -DestinationPath $archivePath

      - name: Upload win-unpacked archive
        shell: powershell
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"
          $archivePath = Join-Path $PWD "dist\wuwchat-V$version.zip"

          gh release upload $tag $archivePath --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
