name: Build and Publish Electron App

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve Release Version
        shell: powershell
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'package.json version is empty.'
          }

          $tag = "v$version"

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure release tag does not exist
        shell: powershell
        run: |
          $tagExists = $false
          $releaseExists = $false

          try {
            $tagRef = gh api "repos/${{ github.repository }}/git/ref/tags/$env:RELEASE_TAG" 2>$null
            if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($tagRef)) {
              $tagExists = $true
            }
          } catch {
            $tagExists = $false
          }

          if ($tagExists) {
            throw "Release tag already exists: $env:RELEASE_TAG"
          }

          try {
            $existingRelease = gh release view $env:RELEASE_TAG --json tagName 2>$null
            if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($existingRelease)) {
              $releaseExists = $true
            }
          } catch {
            $releaseExists = $false
          }

          if ($releaseExists) {
            throw "Release already exists: $env:RELEASE_TAG"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Release Tag
        shell: powershell
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a $env:RELEASE_TAG -m "Release $env:RELEASE_TAG"
          git push origin $env:RELEASE_TAG

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Build Windows Package
        run: npx electron-builder --win

      - name: Archive win-unpacked
        shell: powershell
        run: |
          $sourcePath = Join-Path $PWD 'dist\win-unpacked'
          $archivePath = Join-Path $PWD "dist\wuwchat-$env:APP_VERSION.zip"

          if (-not (Test-Path $sourcePath)) {
            throw "win-unpacked directory not found: $sourcePath"
          }

          if (Test-Path $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }

          Compress-Archive -Path "$sourcePath\*" -DestinationPath $archivePath

      - name: Create GitHub Release
        shell: powershell
        run: |
          gh release create $env:RELEASE_TAG --title $env:RELEASE_TAG --notes "Release $env:RELEASE_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        shell: powershell
        run: |
          $distPath = Join-Path $PWD 'dist'
          $assetPaths = @(
            Join-Path $distPath "wuwchat-$env:APP_VERSION.zip"
            Join-Path $distPath "wuwachat-$env:APP_VERSION-setup.exe"
            Join-Path $distPath 'latest.yml'
          )

          $optionalAssets = @(
            Join-Path $distPath "wuwachat-$env:APP_VERSION-setup.exe.blockmap"
          )

          foreach ($assetPath in $assetPaths) {
            if (-not (Test-Path $assetPath)) {
              throw "Expected release asset not found: $assetPath"
            }
          }

          $existingOptionalAssets = $optionalAssets | Where-Object { Test-Path $_ }
          $allAssets = $assetPaths + $existingOptionalAssets

          gh release upload $env:RELEASE_TAG $allAssets --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
